<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradido Calculator</title>
    <meta name="apple-mobile-web-app-title" content="GDD Calculator">
    <!-- Montserrat wird lokal via @font-face in style.css geladen (offline-faehig) -->
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">



    <script>

        	// Berechne den heutigen Tag des Jahres
		var jetzt = new Date();
		var start = new Date(jetzt.getFullYear(), 0, 0);
		var diff = (jetzt - start) + ((start.getTimezoneOffset() - jetzt.getTimezoneOffset()) * 60 * 1000);
		var tag = Math.floor(diff / (1000 * 60 * 60 * 24));

		// Berechne Faktor1 und Faktor2
		var faktor1 = Math.pow(0.998098, tag-1);
		var faktor2 = 1 / faktor1;

        // true direkt nach einem Ergebnis ("="): die naechste Ziffer beginnt eine neue Zahl
        var justCalculated = false;

        // --- Einstellungen (im localStorage gespeichert; im iFrame ggf. nur fuer die Sitzung) ---
        // factor      = Kaufkraft-Faktor: 1 GDD = factor x Landeswaehrung (Default 1)
        // currency    = Anzeige-Kuerzel der Landeswaehrung (Default "€")
        // showDankBar = DankBar-Zeile + "DankBar to GDD"-Taste anzeigen (Default true)
        var settings = { factor: 1, currency: '€', showDankBar: true, percent: 100 };

        function loadSettings() {
            try {
                var raw = localStorage.getItem('gddCalcSettings');
                if (raw) {
                    var s = JSON.parse(raw);
                    if (s && typeof s === 'object') {
                        var f = parseFloat(s.factor);
                        if (isFinite(f) && f > 0) { settings.factor = f; }
                        if (typeof s.currency === 'string' && s.currency !== '') { settings.currency = s.currency; }
                        if (typeof s.showDankBar === 'boolean') { settings.showDankBar = s.showDankBar; }
                        var pc = parseFloat(s.percent);
                        if (isFinite(pc) && pc >= 0 && pc <= 100) { settings.percent = pc; }
                    }
                }
            } catch (e) { /* localStorage evtl. blockiert (iFrame-Partitionierung) -> Defaults */ }
        }

        function saveSettings() {
            try { localStorage.setItem('gddCalcSettings', JSON.stringify(settings)); } catch (e) { /* ignorieren */ }
        }


        // --- Helfer fuer Zahlen-Formatierung (US-Stil: Punkt = Dezimal, Komma = Tausender) ---

        // Die aktuell getippte Zahl = der Teil hinter dem letzten Operator
        function currentNumber(display) {
            var teile = display.split(/ [+\-*/] /);
            return teile[teile.length - 1];
        }

        // Ersetzt die aktuelle Zahl im Display durch 'neu'
        function replaceCurrentNumber(display, neu) {
            var re = / [+\-*/] /g, m, lastEnd = -1;
            while ((m = re.exec(display)) !== null) { lastEnd = m.index + m[0].length; }
            if (lastEnd === -1) { return neu; }
            return display.slice(0, lastEnd) + neu;
        }

        // Setzt Tausender-Trenner (Komma) in den Ganzzahl-Teil; max. 2 Nachkommastellen
        function formatNumberString(roh) {
            if (roh === '') { return ''; }
            var neg = '';
            if (roh.charAt(0) === '-') { neg = '-'; roh = roh.slice(1); }
            var teile = roh.split('.');
            var ganz = teile[0].replace(/^0+(?=\d)/, '');                  // fuehrende Nullen weg
            ganz = ganz.replace(/\B(?=(\d{3})+(?!\d))/g, ',');             // Tausender-Trenner
            var ergebnis = neg + ganz;
            if (teile.length > 1) { ergebnis += '.' + teile[1].slice(0, 2); }
            return ergebnis;
        }

        // Ergebnis-Zahl einheitlich formatieren: 2 Nachkommastellen + Tausender-Trenner
        function formatResult(zahl) {
            if (!isFinite(zahl)) { return '0.00'; }
            var neg = zahl < 0 ? '-' : '';
            var teile = Math.abs(zahl).toFixed(2).split('.');
            teile[0] = teile[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return neg + teile[0] + '.' + teile[1];
        }


        // --- Klang (per Web Audio erzeugt, keine Audiodatei -> offline-faehig) ---
        // Palette (432-Stimmung): Ziffern/Punkt gleiten 432->288 (Quinte abwaerts);
        // Operatoren + Funktionstasten 648->432 (eine Quinte hoeher); "=" konstant 648,
        // laenger; Warnung = 3 kurze Pulse auf 432 (verbotene Eingabe).
        var __actx = null;
        function __audioCtx() {
            try {
                var AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) { return null; }
                if (!__actx) { __actx = new AC(); }
                if (__actx.state === 'suspended') { __actx.resume(); }
                return __actx;
            } catch (e) { return null; }
        }

        // Ein Ton: gleitet von f1 nach f2 (f2===f1 -> konstant), Laenge in Sekunden.
        function __tone(f1, f2, len, startAt) {
            var ctx = __audioCtx();
            if (!ctx) { return; }
            var t = (startAt != null) ? startAt : ctx.currentTime;
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(f1, t);
            if (f2 && f2 !== f1) { osc.frequency.exponentialRampToValueAtTime(f2, t + Math.min(len, 0.08)); }
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.exponentialRampToValueAtTime(0.09, t + 0.010);   // 0.09 = Lautstaerke
            gain.gain.exponentialRampToValueAtTime(0.0001, t + len);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + len + 0.02);
        }

        function soundDigit() { __tone(432, 288, 0.09); }   // Ziffern + Dezimalpunkt
        function soundFunc()  { __tone(648, 432, 0.09); }   // Operatoren + Funktionstasten
        function soundEquals(){ __tone(648, 648, 0.30); }   // "=" : konstant, laenger

        var __lastWarn = -1;
        function soundWarn() {                               // Warnung: 3 Pulse auf 432, konstant
            var ctx = __audioCtx();
            if (!ctx) { return; }
            var now = ctx.currentTime;
            if (__lastWarn >= 0 && (now - __lastWarn) < 0.45) { return; }   // nicht stapeln
            __lastWarn = now;
            var d = 0.11, gap = 0.06;
            for (var i = 0; i < 3; i++) { __tone(432, 432, d, now + i * (d + gap)); }
        }


        // Ziffern und Operatoren eingeben (mit Live-Pruefung und -Formatierung)
        function appendOperation(operation) {
            // Ergebnisse unten NICHT loeschen — sie bleiben bis "AC" stehen
            var display = document.getElementById('resultArea').innerHTML;

            var istOperator = (typeof operation === 'string') && /[+\-*/]/.test(operation);

            // Nach einem Ergebnis ("="): Ziffer/Punkt beginnt eine neue Zahl,
            // ein Operator rechnet mit dem Ergebnis weiter.
            if (justCalculated) {
                justCalculated = false;
                if (!istOperator) { display = ''; }
            }

            if (istOperator) {
                var cur = currentNumber(display);
                if (cur === '' || cur.charAt(cur.length - 1) === '.') { soundWarn(); return; }   // kein Operator ohne abgeschlossene Zahl
                if (display.charAt(display.length - 1) === ' ') { soundWarn(); return; }          // kein doppelter Operator
                display += operation;
                soundFunc();
            } else if (operation === '.') {
                var curP = currentNumber(display);
                if (curP.indexOf('.') !== -1) { soundWarn(); return; }                           // nur ein Punkt pro Zahl
                if (curP === '') { display += '0'; }                                              // ".5" -> "0.5"
                display += '.';
                soundDigit();
            } else {
                // Ziffer
                var ziffer = String(operation);
                var curD = currentNumber(display);
                var p = curD.indexOf('.');
                if (p !== -1 && (curD.length - p - 1) >= 2) { soundWarn(); return; }              // max. 2 Nachkommastellen
                var roh = curD.replace(/,/g, '') + ziffer;
                display = replaceCurrentNumber(display, formatNumberString(roh));
                soundDigit();
            }

            document.getElementById('resultArea').innerHTML = display;
            setFontsizeByLength();
        }

        // Letztes Zeichen loeschen
        function deleteLast() {
            // Ergebnisse unten NICHT loeschen — sie bleiben bis "AC" stehen
            justCalculated = false;
            var display = document.getElementById('resultArea').innerHTML;
            if (display === '') { soundWarn(); return; }
            if (display.charAt(display.length - 1) === ' ') {
                display = display.slice(0, -3);                                      // " op " entfernen
            } else {
                var cur = currentNumber(display);
                if (cur.charAt(cur.length - 1) === '.') {
                    display = replaceCurrentNumber(display, cur.slice(0, -1));       // Punkt entfernen
                } else {
                    var roh = cur.replace(/,/g, '').slice(0, -1);                    // letzte Ziffer entfernen
                    display = replaceCurrentNumber(display, roh === '' ? '' : formatNumberString(roh));
                }
            }
            document.getElementById('resultArea').innerHTML = display;
            setFontsizeByLength();
            soundFunc();
        }

        // Schriftgröße an die Länge der Eingabe anpassen
        function setFontsizeByLength() {
            let length = document.getElementById('resultArea').innerHTML.length;
            if (length > 10) {
                document.getElementById("resultArea").style.fontSize = "32px";
            }
            else {
                document.getElementById("resultArea").style.fontSize = "64px";
            }
        }


        // Sub-Ergebnis-Zeile(n) leeren — mit erzwungenem Repaint.
        // Safari/WebKit zeichnet leere Flex-Container nicht immer neu, sonst bleibt
        // die DankBar-Zeile als "Geist" stehen.
        function clearSubResults() {
            var el = document.getElementById('resultArea2');
            el.innerHTML = "";
            el.style.display = "none";
            void el.offsetHeight;   // Reflow erzwingen
            el.style.display = "";
        }

        // Alles löschen
        function allClear() {
            document.getElementById('resultArea').innerHTML = "";
            clearSubResults();
            justCalculated = false;
            soundFunc();
        }

        // GradidoRabatt per Overlay einstellen (Zahlenfeld wie die Einstellungen)
        function openPercent() {
            soundFunc();
            var inp = document.getElementById('pctInput');
            inp.value = settings.percent;
            document.getElementById('percentOverlay').classList.add('open');
            try { inp.focus(); inp.select(); } catch (e) {}   // Komfort: Zahlenfeld gleich aktiv
        }

        function closePercent() {
            var v = parseFloat(String(document.getElementById('pctInput').value).replace(',', '.'));
            if (!isFinite(v)) { v = settings.percent; }       // leer/ungueltig -> unveraendert
            if (v < 0) { v = 0; }
            if (v > 100) { v = 100; }
            settings.percent = v;
            document.getElementById('percent').innerHTML = v;
            saveSettings();
            document.getElementById('percentOverlay').classList.remove('open');
            calculateResult();
            soundFunc();
        }

        // Sicherer Ersatz fuer eval(): wertet den eingegebenen Ausdruck aus.
        // Erlaubt nur Zahlen und die Operatoren + - * / (Punkt vor Strich).
        // Liefert NaN bei leerer oder unzulaessiger Eingabe (statt abzustuerzen).
        function safeCalc(ausdruck) {
            if (ausdruck == null) { return NaN; }
            // Leerraum (auch Zeilenumbrueche aus dem HTML) und Tausender-Komma entfernen
            var s = String(ausdruck).replace(/\s/g, '').replace(/,/g, '');
            if (s === '') { return NaN; }
            if (!/^[0-9.+\-*/]*$/.test(s)) { return NaN; }

            // 1) In Zahlen und Operatoren zerlegen
            var tokens = [];
            var i = 0;
            while (i < s.length) {
                var ch = s[i];
                if (ch === ' ') { i++; continue; }
                if ('+-*/'.indexOf(ch) !== -1) {
                    var prev = tokens[tokens.length - 1];
                    var istVorzeichen = (tokens.length === 0) || (prev && prev.op !== undefined);
                    if ((ch === '+' || ch === '-') && istVorzeichen) {
                        var sign = (ch === '-') ? -1 : 1;
                        i++;
                        while (s[i] === ' ') { i++; }
                        var z = '';
                        while (i < s.length && /[0-9.]/.test(s[i])) { z += s[i]; i++; }
                        if (z === '' || isNaN(parseFloat(z))) { return NaN; }
                        tokens.push({ val: sign * parseFloat(z) });
                    } else {
                        tokens.push({ op: ch });
                        i++;
                    }
                } else if (/[0-9.]/.test(ch)) {
                    var n = '';
                    while (i < s.length && /[0-9.]/.test(s[i])) { n += s[i]; i++; }
                    if (isNaN(parseFloat(n))) { return NaN; }
                    tokens.push({ val: parseFloat(n) });
                } else {
                    return NaN;
                }
            }
            if (tokens.length === 0 || tokens[0].val === undefined) { return NaN; }

            // 2) Punkt vor Strich: erst * und /
            var stufe = [tokens[0]];
            for (var k = 1; k < tokens.length; k += 2) {
                var op = tokens[k], rhs = tokens[k + 1];
                if (!op || op.op === undefined || !rhs || rhs.val === undefined) { return NaN; }
                if (op.op === '*' || op.op === '/') {
                    var links = stufe[stufe.length - 1];
                    links.val = (op.op === '*') ? links.val * rhs.val : links.val / rhs.val;
                } else {
                    stufe.push(op, rhs);
                }
            }

            // 3) dann + und -
            var ergebnis = stufe[0].val;
            for (var mm = 1; mm < stufe.length; mm += 2) {
                var o = stufe[mm], r = stufe[mm + 1];
                if (!o || o.op === undefined || !r || r.val === undefined) { return NaN; }
                ergebnis = (o.op === '+') ? ergebnis + r.val : ergebnis - r.val;
            }
            if (!isFinite(ergebnis)) { return NaN; }
            return ergebnis;
        }

        // Ergebnis berechnen (ohne Klang; den spielt onEquals). Gibt true bei Erfolg.
        function calculateResult() {
            let container = document.getElementById('resultArea');
            let result = safeCalc(container.innerHTML);
            if (isNaN(result)) { return false; }   // leere oder unzulaessige Eingabe: nichts tun
            container.innerHTML = formatResult(result);
            document.getElementById("resultArea").style.fontSize = "64px";

            var percentTabelle =  document.getElementById("percent").firstChild.nodeValue;
            let euro = result *(100-percentTabelle)/100;
            let gdd = (result - euro) / settings.factor;        // Kaufkraft-Faktor: 1 GDD = factor x Landeswaehrung
            let dankbar = faktor2 * gdd;

            if(document.getElementById("percent").innerHTML > 0) {
                let container2 = document.getElementById('resultArea2');
                var lines = [];
                lines.push(settings.currency + " " + formatResult(euro) + "  |  GDD " + formatResult(gdd));
                if (settings.showDankBar) {
                    lines.push("Daily rate " + faktor2.toFixed(4) + " | DankBar " + formatResult(dankbar));
                }
                if (settings.factor !== 1) {
                    lines.push("Purchasing power: 1 GDD = " + settings.factor + " " + settings.currency);
                }
                container2.innerHTML = lines.join("<br/>");
            }
            else {
                clearSubResults();
            }
            justCalculated = true;
            return true;
        }

        // "=" : rechnen + passenden Klang (Erfolg vs. Warnung)
        function onEquals() {
            if (calculateResult()) { soundEquals(); } else { soundWarn(); }
        }


        // DankBar in Gradido umrechnen
        function setDankBarMode() {
            soundFunc();
            calculateResult();
            let container2 = document.getElementById('resultArea2');
            let container = document.getElementById('resultArea');
            let zahl = safeCalc(container.innerHTML);
            if (isNaN(zahl)) { return; }   // leere oder unzulaessige Eingabe: nichts tun
            container.innerHTML = formatResult(zahl);
            var gdd = zahl * faktor1;
            container2.innerHTML = "Daily rate " + faktor1.toFixed(4) + "<br/>" + formatResult(zahl) + " DankBar = " + formatResult(gdd) + " Gradido";
            justCalculated = true;
        }


        // --- Einstellungs-Panel ---
        function openSettings() {
            soundFunc();
            document.getElementById('setFactor').value = settings.factor;
            document.getElementById('setCurrency').value = settings.currency;
            document.getElementById('setDankBar').checked = settings.showDankBar;
            document.getElementById('settingsOverlay').classList.add('open');
        }

        function closeSettings() {
            var f = parseFloat(String(document.getElementById('setFactor').value).replace(',', '.'));
            settings.factor = (isFinite(f) && f > 0) ? f : 1;
            var c = document.getElementById('setCurrency').value;
            settings.currency = (c && c.trim() !== '') ? c.trim() : '€';
            settings.showDankBar = document.getElementById('setDankBar').checked;
            saveSettings();
            applyDankBarVisibility();
            document.getElementById('settingsOverlay').classList.remove('open');
            calculateResult();   // Anzeige mit neuen Werten aktualisieren (falls ein Ergebnis steht)
            soundFunc();
        }

        // DankBar-Taste zeigen/verstecken; versteckt = inaktive Platzhalter-Flaeche
        function applyDankBarVisibility() {
            var btn = document.getElementById('dankBarButton');
            if (!btn) { return; }
            if (settings.showDankBar) {
                btn.classList.add('result');
                btn.classList.remove('blankKey');
                btn.innerHTML = 'DankBar<br/>to GDD';
                btn.setAttribute('onclick', 'setDankBarMode()');
            } else {
                btn.classList.remove('result');
                btn.classList.add('blankKey');
                btn.innerHTML = '';
                btn.removeAttribute('onclick');
            }
        }

        // Beim Start: Einstellungen laden + anwenden
        window.addEventListener('DOMContentLoaded', function () {
            loadSettings();
            applyDankBarVisibility();
            document.getElementById('percent').innerHTML = settings.percent;
        });

    </script>



</head>
<body>

    <img id="logo" src="gradido-coin.png" alt="Gradido Coin">
    <div id="topbar">
        <button id="gearBtn" onclick="openSettings()" aria-label="Settings" title="Settings">&#9881;</button>
    </div>

    <div id="resultArea" class="resultArea"></div>

    <div id="discountTable"  class="resultArea">
        <table class = "discountTable">
            <tr>
                <td id="discount" class = "discountTable">Gradido %</td>
                <td id="percent" class = "discountTable">100</td>

            </tr>



        </table>
    </div>

    <div id="resultArea2"  class="resultArea"></div>


 <table>
    <tr>
        <td onclick="allClear()" class="delete">AC </td>
        <td onclick="setDankBarMode()"  class="result" id="dankBarButton">DankBar<br/>to GDD</td>
        <td onclick="openPercent()" class="result">%</td>
        <td onclick="deleteLast()" class="delete" >DEL</td>


    </tr>

    <tr>
        <td onclick="appendOperation(7)">7</td>
        <td onclick="appendOperation(8)">8</td>
        <td onclick="appendOperation(9)">9</td>
        <td onclick="appendOperation(' / ')" class="highlight">/</td>
    </tr>

    <tr>
        <td onclick="appendOperation(4)">4</td>
        <td onclick="appendOperation(5)">5</td>
        <td onclick="appendOperation(6)">6</td>
        <td onclick="appendOperation(' * ')" class="highlight">x</td>

    </tr>

    <tr>
        <td onclick="appendOperation(1)">1</td>
        <td onclick="appendOperation(2)">2</td>
        <td onclick="appendOperation(3)">3</td>
        <td onclick="appendOperation(' - ')" class="highlight">–</td>


    </tr>

    <tr>
        <td onclick="appendOperation(0)">0</td>
        <td onclick="appendOperation('.')">.</td>
        <td onclick="onEquals()" class="result">=</td>
        <td onclick="appendOperation(' + ')" class="highlight">+</td>

    </tr>


 </table>

    <!-- Einstellungs-Overlay (Klick auf den Hintergrund schliesst + uebernimmt) -->
    <div id="settingsOverlay" onclick="if(event.target===this) closeSettings()">
        <div id="settingsPanel">
            <h2>Settings</h2>
            <div class="setRow">
                <label for="setFactor">Purchasing power &mdash; 1 GDD =</label>
                <input id="setFactor" type="number" min="0" step="any" inputmode="decimal">
            </div>
            <div class="setRow">
                <label for="setCurrency">Currency</label>
                <input id="setCurrency" type="text" maxlength="6">
            </div>
            <div class="setRow check">
                <input id="setDankBar" type="checkbox">
                <label for="setDankBar">Show DankBar</label>
            </div>
            <button id="settingsClose" onclick="closeSettings()">Done</button>
        </div>
    </div>

    <!-- Gradido-%-Overlay (Klick auf den Hintergrund schliesst + uebernimmt) -->
    <div id="percentOverlay" onclick="if(event.target===this) closePercent()">
        <div id="percentPanel">
            <h2>Gradido %</h2>
            <div class="setRow">
                <label for="pctInput">Gradido share (0&ndash;100 %)</label>
                <input id="pctInput" type="number" min="0" max="100" step="any" inputmode="numeric">
            </div>
            <button id="percentClose" onclick="closePercent()">Done</button>
        </div>
    </div>

    <!-- Service Worker registrieren: offline-faehig + automatisches Update -->
    <script>
        if ('serviceWorker' in navigator) {
            // Beim Erstbesuch gibt es noch keinen Controller -> dann NICHT neu laden.
            var hadController = !!navigator.serviceWorker.controller;
            var refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
                if (refreshing || !hadController) { return; }
                refreshing = true;
                window.location.reload();   // neue Version sofort uebernehmen
            });
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js').then(function (reg) {
                    reg.update();   // bei jedem Start auf neue Version pruefen
                }).catch(function (err) {
                    console.error('Service-Worker-Registrierung fehlgeschlagen:', err);
                });
            });
        }
    </script>
</body>
</html>
